<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkish Cyrillic Converter</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; background: #f4f4f9; }
        h2 { color: #333; }
        .container { display: flex; flex-direction: column; gap: 1rem; }
        textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; resize: vertical; }
        .label { font-weight: bold; margin-bottom: 5px; display: block; }
        .output-box { background: white; min-height: 150px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; white-space: pre-wrap; font-size: 18px; }
    </style>
</head>
<body>

    <h2>Turkish Cyrillic Converter</h2>
    <p>Type in Turkish (Latin) to see the Cyrillic transcription</p>

    <div class="container">
        <div>
            <label class="label">Turkish (Latin):</label>
            <textarea id="input" placeholder="Buraya yazın..."></textarea>
        </div>

        <div>
            <label class="label">Cyrillic Output:</label>
            <div id="output" class="output-box"></div>
        </div>
    </div>

    <script>
        const map = {
            'a': 'а', 'b': 'б', 'c': 'җ', 'ç': 'ч', 'd': 'д', 'e': 'е', 'f': 'ф', 
            'g': 'г', 'ğ': 'ғ', 'h': 'х', 'ı': 'ы', 'i': 'и', 'j': 'ж', 'k': 'к', 
            'l': 'л', 'm': 'м', 'n': 'н', 'o': 'о', 'ö': 'ө', 'p': 'п', 'r': 'р', 
            's': 'с', 'ş': 'ш', 't': 'т', 'u': 'у', 'ü': 'ү', 'v': 'в', 'y': 'й', 'z': 'з',
            'A': 'А', 'B': 'Б', 'C': 'Җ', 'Ç': 'Ч', 'D': 'Д', 'E': 'Е', 'F': 'Ф', 
            'G': 'Г', 'Ğ': 'Ғ', 'H': 'Х', 'I': 'Ы', 'İ': 'И', 'J': 'Ж', 'K': 'К', 
            'L': 'Л', 'M': 'М', 'N': 'Н', 'O': 'О', 'Ö': 'Ө', 'P': 'П', 'R': 'Р', 
            'S': 'С', 'Ş': 'Ш', 'T': 'Т', 'U': 'У', 'Ү': 'Ү', 'V': 'В', 'Y': 'Й', 'Z': 'З'
        };

        const input = document.getElementById('input');
        const output = document.getElementById('output');

        input.addEventListener('input', () => {
            let text = input.value;

            // Handle 'ts' -> 'ц' first as it is a double character
            text = text.replace(/ts/g, 'ц').replace(/Ts/g, 'Ц').replace(/TS/g, 'Ц');

            // Map individual characters
            let result = "";
            for (let char of text) {
                result += map[char] || char;
            }
            output.innerText = result;
        });
    </script>
</body>
</html>
