<!DOCTYPE html>
<html lang="ga">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Irish Verb Conjugator</title>
    <style>
        :root {
            --bg: #f8f9fa; --card: #fff; --border: #a2a9b1; --th: #f2f2f2; --text: #202122; --head: #000; --accent: #0056b3;
        }
        :root[data-theme="dark"] {
            --bg: #101418; --card: #1e232a; --border: #444d56; --th: #22272e; --text: #adbac7; --head: #f0f6fc; --accent: #3182ce;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 20px; }
        .wrap { max-width: 1000px; margin: 0 auto; background: var(--card); padding: 20px; border: 1px solid var(--border); }
        .hdr { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        h1 { color: var(--head); font-size: 1.5em; margin: 0; }
        h2 { color: var(--head); font-size: 1.2em; margin: 20px 0 10px; }
        button { background: var(--accent); color: #fff; padding: 8px 16px; border: none; cursor: pointer; font-weight: bold; }
        .tgl { background: var(--th); color: var(--text); border: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin: 15px 0; }
        label { display: block; font-weight: bold; font-size: 0.85em; margin-bottom: 5px; color: var(--text); }
        input { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid var(--border); background: var(--card); color: var(--text); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; margin-bottom: 15px; }
        th, td { border: 1px solid var(--border); padding: 6px; text-align: left; }
        th { background: var(--th); color: var(--head); }
        .p-col { background: var(--th); font-weight: bold; width: 15%; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="hdr">
        <h1>Pseudo-Irish Verb Conjugator</h1>
        <button class="tgl" onclick="tgl()">Toggle Mode</button>
    </div>
    
    <div class="grid">
        <div>
            <label for="r">Verbal Root (e.g., mol, cuir, glan, léigh)</label>
            <input type="text" id="r" value="mol" oninput="run()">
        </div>
    </div>
    
    <div id="out"></div>
</div>

<script>
const E = {
    broad: {
        pres: ['aim', 'air', 'ann', 'aidh', 'aimid', 'taoi', 'aid'],
        past: ['as', 'ais', '', 'aidh', 'amar', 'abhar', 'adar'],
        ph:   ['ainn', 'tá', 'adh', 'adhair', 'aimis', 'taois', 'aidís'],
        fut:  ['fad', 'fair', 'faidh', 'faidh', 'faimid', 'fthí', 'faid'],
        cond: ['fainn', 'fá', 'fadh', 'fadh', 'faimis', 'faithís', 'faidís'],
        psub: ['as', 'asair', 'asann', 'asaidh', 'asmid', 'asbha', 'asaid'],
        pastSub: ['ainn', 'tá', 'adh', 'adh', 'aimis', 'taois', 'aidís'],
        imp:  ['aim', 'g', 'adh', 'adhair', 'aimis', 'gí', 'aidís']
    },
    slender: {
        pres: ['im', 'ir', 'eann', 'idh', 'imid', 'teoir', 'id'],
        past: ['eas', 'is', '', 'igh', 'eamar', 'eabhar', 'eadar'],
        ph:   ['inn', 'teá', 'eadh', 'eadhair', 'imis', 'teois', 'idís'],
        fut:  ['fead', 'fir', 'fidh', 'fidh', 'fimid', 'fthí', 'fid'],
        cond: ['finn', 'feá', 'feadh', 'feadh', 'fimis', 'faithís', 'fidís'],
        psub: ['es', 'esir', 'esann', 'esidh', 'esmid', 'esbha', 'esid'],
        pastSub: ['inn', 'teá', 'eadh', 'eadh', 'imis', 'teois', 'idís'],
        imp:  ['im', 'g', 'eadh', 'eadhair', 'imis', 'gí', 'idís']
    }
};

const P = ["1st Sing.", "2nd Sing.", "3rd Sing. M", "3rd Sing. F", "1st Plur.", "2nd Plur.", "3rd Plur."];

function tgl() {
    const el = document.documentElement;
    el.setAttribute('data-theme', el.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

function autoDetectMode(root) {
    const vowels = root.match(/[aeiouáéíóú]/gi);
    if (!vowels) return 'broad';
    const lastVowel = vowels[vowels.length - 1].toLowerCase();
    return ['e', 'i', 'é', 'í'].includes(lastVowel) ? 'slender' : 'broad';
}

function lenite(word) {
    const map = { b:'bh', c:'ch', d:'dh', f:'fh', g:'gh', m:'mh', p:'ph', s:'sh', t:'th', B:'Bh', C:'Ch', D:'Dh', F:'Fh', G:'Gh', M:'Mh', P:'Ph', S:'Sh', T:'Th' };
    return map[word] ? map[word] + word.slice(1) : word;
}

function eclipse(word) {
    const map = { b:'mb', c:'gc', d:'nd', f:'bhf', g:'ng', p:'bp', t:'dt', m:'mm', B:'Mb', C:'Gc', D:'Nd', F:'Bhf', G:'Ng', P:'Bp', T:'Dt', M:'Mm' };
    return map[word] ? map[word] + word.slice(1) : word;
}

function buildTbl(title, hdrs, rowsData) {
    return `<h2>${title}</h2><table><thead><tr><th class="p-col">Person</th>${hdrs.map(h => `<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${P.map((p, i) => `<tr><td class="p-col">${p}</td>${rowsData.map(r => `<td>${r(i)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function run() {
    const r = document.getElementById('r').value.trim();
    if(!r) return;
    
    const mode = autoDetectMode(r);
    const lr = lenite(r);
    const er = eclipse(r);
    const e = E[mode];

    document.getElementById('out').innerHTML = 
        `<p style="font-size:0.9em; font-style:italic;">Detected Alignment: <strong>${mode.toUpperCase()}</strong></p>` +
        buildTbl("Indicative Mood", ["Present", "Past", "Past Habitual", "Future"], [
            i => r + e.pres[i],
            i => i === 2 ? lr : lr + e.past[i],
            i => lr + e.ph[i],
            i => r + e.fut[i]
        ]) + 
        buildTbl("Other Moods", ["Conditional", "Present Subjunctive", "Past Subjunctive", "Imperative"], [
            i => lr + e.cond[i],
            i => er + e.psub[i], 
            i => er + e.pastSub[i], 
            i => i === 1 ? r : r + e.imp[i]
        ]);
}
run();
</script>
</body>
</html>
