<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Baltic Noun Declinator</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #fff;
            color: #202122;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .input-box {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #a2a9b1;
        }
        .input-row {
            margin-bottom: 12px;
        }
        label {
            font-weight: bold;
            margin-right: 8px;
        }
        input[type="text"] {
            padding: 5px;
            font-size: 14px;
            border: 1px solid #a2a9b1;
            width: 200px;
        }
        .radio-group {
            display: inline-block;
            margin-right: 15px;
        }
        table.wikitable {
            background-color: #f8f9fa;
            border: 1px solid #a2a9b1;
            border-collapse: collapse;
            width: 100%;
            font-size: 14px;
        }
        table.wikitable th, table.wikitable td {
            border: 1px solid #a2a9b1;
            padding: 0.5em 0.6em;
            text-align: left;
        }
        table.wikitable th {
            background-color: #eaecf0;
        }
        table.wikitable thead th {
            text-align: center;
        }
        .highlight {
            font-weight: bold;
            color: #b32424;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Pseudo-Baltic Noun Declinator</h2>
    
    <div class="input-box">
        <div class="input-row">
            <label for="noun">Noun Lemma: </label>
            <input type="text" id="noun" value="šuns" autocomplete="off">
        </div>
        <div>
            <label>Gender System:</label>
            <div class="radio-group">
                <input type="radio" id="g-masc" name="ngender" value="masc" checked>
                <label for="g-masc">Masculine (-s)</label>
            </div>
            <div class="radio-group">
                <input type="radio" id="g-fem" name="ngender" value="fem">
                <label for="g-fem">Feminine (-a)</label>
            </div>
        </div>
    </div>

    <table class="wikitable">
        <thead>
            <tr>
                <th>Case</th>
                <th>Singular</th>
                <th>Plural</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>1. Nominative</th>
                <td id="c1-sg"></td>
                <td id="c1-pl"></td>
            </tr>
            <tr>
                <th>2. Genitive</th>
                <td id="c2-sg"></td>
                <td id="c2-pl"></td>
            </tr>
            <tr>
                <th>3. Dative</th>
                <td id="c3-sg"></td>
                <td id="c3-pl"></td>
            </tr>
            <tr>
                <th>4. Accusative</th>
                <td id="c4-sg"></td>
                <td id="c4-pl"></td>
            </tr>
            <tr>
                <th>5. Instrumental</th>
                <td id="c5-sg"></td>
                <td id="c5-pl"></td>
            </tr>
            <tr>
                <th>6. Locative</th>
                <td id="c6-sg"></td>
                <td id="c6-pl"></td>
            </tr>
            <tr>
                <th>7. Vocative</th>
                <td id="c7-sg"></td>
                <td id="c7-pl"></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
const nounInput = document.getElementById('noun');
const genderRadios = document.getElementsByName('ngender');

function decline() {
    let input = nounInput.value.trim().toLowerCase();
    if (input.length === 0) return;

    let gender = "masc";
    for (let radio of genderRadios) {
        if (radio.checked) { gender = radio.value; break; }
    }

    let root = input;
    let originalEnding = "";

    if (gender === "masc") {
        if (input.endsWith('s')) {
            // Check if there is an underlying thematic vowel right before the -s
            let stemVowel = input.charAt(input.length - 2);
            if (['a', 'i', 'u'].includes(stemVowel)) {
                root = input.slice(0, -2); // Drop both the vowel and -s (e.g., draugas -> draug, vėjas -> vėj)
                originalEnding = stemVowel + "s";
            } else {
                root = input.slice(0, -1); // Athematic/Consonantal stem case: drop only -s (e.g., šuns -> šun)
                originalEnding = "s";
            }
        }

        // Apply clean, uniform vocalic endings directly onto the bare consonant root
        document.getElementById('c1-sg').innerHTML = `${root}<span class="highlight">${originalEnding}</span>`;
        document.getElementById('c1-pl').innerHTML = `${root}<span class="highlight">i</span>`;
        
        document.getElementById('c2-sg').innerHTML = `${root}<span class="highlight">a</span>`;
        document.getElementById('c2-pl').innerHTML = `${root}<span class="highlight">ū</span>`;
        
        document.getElementById('c3-sg').innerHTML = `${root}<span class="highlight">ui</span>`;
        document.getElementById('c3-pl').innerHTML = `${root}<span class="highlight">mus</span>`;
        
        document.getElementById('c4-sg').innerHTML = `${root}<span class="highlight">u</span>`;
        document.getElementById('c4-pl').innerHTML = `${root}<span class="highlight">us</span>`;
        
        document.getElementById('c5-sg').innerHTML = `${root}<span class="highlight">u</span>`;
        document.getElementById('c5-pl').innerHTML = `${root}<span class="highlight">ais</span>`;
        
        document.getElementById('c6-sg').innerHTML = `${root}<span class="highlight">ā</span>`;
        document.getElementById('c6-pl').innerHTML = `${root}<span class="highlight">os</span>`;
        
        document.getElementById('c7-sg').innerHTML = `${root}<span class="highlight">e</span>`;
        document.getElementById('c7-pl').innerHTML = `${root}<span class="highlight">i</span>`;
    } else {
        if (input.endsWith('a')) {
            root = input.slice(0, -1);
        }
        document.getElementById('c1-sg').innerHTML = `${root}<span class="highlight">a</span>`;
        document.getElementById('g-fem').checked = true; // Safety toggle logic
        document.getElementById('c1-pl').innerHTML = `${root}<span class="highlight">os</span>`;
        document.getElementById('c2-sg').innerHTML = `${root}<span class="highlight">os</span>`;
        document.getElementById('c2-pl').innerHTML = `${root}<span class="highlight">ū</span>`;
        document.getElementById('c3-sg').innerHTML = `${root}<span class="highlight">ai</span>`;
        document.getElementById('c3-pl').innerHTML = `${root}<span class="highlight">mos</span>`;
        document.getElementById('c4-sg').innerHTML = `${root}<span class="highlight">an</span>`;
        document.getElementById('c4-pl').innerHTML = `${root}<span class="highlight">as</span>`;
        document.getElementById('c5-sg').innerHTML = `${root}<span class="highlight">an</span>`;
        document.getElementById('c5-pl').innerHTML = `${root}<span class="highlight">amis</span>`;
        document.getElementById('c6-sg').innerHTML = `${root}<span class="highlight">ā</span>`;
        document.getElementById('c6-pl').innerHTML = `${root}<span class="highlight">os</span>`;
        document.getElementById('c7-sg').innerHTML = `${root}<span class="highlight">a</span>`;
        document.getElementById('c7-pl').innerHTML = `${root}<span class="highlight">os</span>`;
    }
}

function autoDetectGender() {
    let input = nounInput.value.trim().toLowerCase();
    if (input.endsWith('a') && !input.endsWith('as') && !input.endsWith('is') && !input.endsWith('us')) {
        document.getElementById('g-fem').checked = true;
    } else if (input.endsWith('s')) {
        document.getElementById('g-masc').checked = true;
    }
    decline();
}

nounInput.addEventListener('input', autoDetectGender);
for (let radio of genderRadios) { radio.addEventListener('change', decline); }
decline();
</script>

</body>
</html>
