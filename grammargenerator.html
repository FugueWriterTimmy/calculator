<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conlang Morphology Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e2e2e2; padding: 20px; line-height: 1.4;}
        .container { max-width: 1100px; margin: auto; background: #16213e; padding: 30px; border-radius: 12px; }
        .config-panel { background: #0f3460; padding: 20px; border-radius: 8px; margin-bottom: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #4ecca3; }
        input, select { width: 100%; padding: 8px; border-radius: 4px; border: none; background: #1a1a2e; color: white; box-sizing: border-box; }
        button { background: #4ecca3; color: #1a1a2e; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.1rem; width: 100%; margin-top: 10px; }
        button:hover { background: #45b393; }
        .section { margin-top: 30px; border-top: 1px solid #4ecca333; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; background: #0f3460; }
        th, td { border: 1px solid #16213e; padding: 10px; text-align: left; }
        th { background: #4ecca3; color: #1a1a2e; text-transform: uppercase; font-size: 0.85rem; }
        .morph { color: #f9ed69; font-weight: bold; }
        #translator-box, .word-creator { background: #1a1a2e; padding: 20px; border-radius: 8px; border: 2px solid #4ecca3; margin-bottom: 20px;}
        .lexicon-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 0.85rem; max-height: 300px; overflow-y: auto; background: #0f3460; padding: 10px; border-radius: 8px; }
        .translation-output { margin-top: 15px; font-size: 1.8rem; color: #4ecca3; font-family: 'Courier New', Courier, monospace; min-height: 2rem; border-left: 4px solid #4ecca3; padding-left: 15px;}
        .syllable-chips { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 5px; }
        .syllable-chips label { display: flex; align-items: center; gap: 5px; background: #1a1a2e; padding: 5px 10px; border-radius: 4px; cursor: pointer; color: white; font-size: 0.8rem;}
        .syllable-chips input { width: auto; }
        h2 { color: #4ecca3; margin-top: 40px; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Advanced Morphology Engine</h1>
    
    <div class="config-panel">
        <div>
            <div class="input-group"><label>Consonants</label><input type="text" id="cons" value="p, t, k, m, n, s, l, r"></div>
            <div class="input-group"><label>Vowels</label><input type="text" id="vows" value="a, e, i, o, u"></div>
            <div class="input-group">
                <label>Complex Syllable Structures</label>
                <div class="syllable-chips" id="syllable-types">
                    <label><input type="checkbox" value="cv" checked> CV</label>
                    <label><input type="checkbox" value="cvc" checked> CVC</label>
                    <label><input type="checkbox" value="ccv" checked> CCV</label>
                    <label><input type="checkbox" value="vcc"> VCC</label>
                    <label><input type="checkbox" value="cvcc"> CVCC</label>
                    <label><input type="checkbox" value="ccvc"> CCVC</label>
                    <label><input type="checkbox" value="ccvcc"> CCVCC</label>
                </div>
            </div>
        </div>
        <div>
            <div class="input-group"><label>Cases</label><input type="text" id="cases" value="Nominative, Accusative, Genitive, Dative"></div>
            <div class="input-group"><label>Genders</label><input type="text" id="genders" value="Masculine, Feminine"></div>
            <div class="input-group"><label>Tenses</label><input type="text" id="tenses" value="Present, Past, Future"></div>
            <div style="display: flex; gap: 15px; margin-top: 10px;">
                <label><input type="checkbox" id="useDual"> Dual</label>
                <label><input type="checkbox" id="noAmbiguity" checked> Unique</label>
                <label><input type="checkbox" id="zeroEnding" checked> Unmarked Nom.Sg</label>
            </div>
        </div>
    </div>

    <button onclick="generate()">Generate Language</button>

    <div class="word-creator" id="creator-box" style="display:none;">
        <label>Add New Word</label>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="text" id="newWordMeaning" placeholder="English meaning">
            <select id="newWordType"><option value="noun">Noun</option><option value="verb">Verb</option></select>
            <button onclick="addNewWord()" style="width: auto; padding: 8px 15px; margin-top: 0;">Add</button>
        </div>
    </div>

    <div id="translator-box" class="section" style="display:none;">
        <label>Translator</label>
        <input type="text" id="transInput" placeholder="Try: man.nominative dog.plural eat.past" oninput="translateInput()">
        <div class="translation-output" id="transOutput"></div>
    </div>

    <div id="lexicon-section" style="display:none;">
        <h2>Lexicon</h2>
        <div id="lexicon-display" class="lexicon-container"></div>
    </div>
    <div id="output"></div>
</div>

<script>
    let nounMap = {}, verbMap = {}, lexicon = {};
    const nounEnglish = ["dog","cat","man","woman","water","stone","tree","sun","moon","star","fire","river","mountain","house","book","hand","eye","heart","bird","fish","bread","city","road","child","friend","king","sword","shield","field","sky","rain","wind","gold","iron","name","voice","night","day","forest","sea","flower","seed","blood","bone","dream","spirit","time","life","death","truth"];
    const verbEnglish = ["eat","drink","sleep","walk","run","see","hear","speak","love","kill","give","take","find","lose","make","break","build","sit","stand","fall","fly","swim","fight","know","think","want","go","come","stay","call","help","work","play","write","read","sing","dance","laugh","cry","open","close","hit","push","pull","burn","wash","fear","hope","buy","sell"];

    function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
    function getVal(id) { return document.getElementById(id).value.split(',').map(s => s.trim()).filter(s => s !== ""); }
    
    function getSyllables() {
        const checked = Array.from(document.querySelectorAll('#syllable-types input:checked')).map(i => i.value);
        return checked.length > 0 ? checked : ["cv"];
    }

    function makeSyllable(c, v) {
        const pattern = pick(getSyllables());
        return pattern.split('').map(char => (char === 'c' ? pick(c) : pick(v))).join('');
    }

    function makeWord(c, v, min=1, max=2) {
        let word = "";
        let count = Math.floor(Math.random()*(max-min+1))+min;
        for(let i=0; i<count; i++) word += makeSyllable(c, v);
        return word;
    }

    function generate() {
        const c = getVal('cons'), v = getVal('vows');
        const cases = getVal('cases'), genders = getVal('genders'), tenses = getVal('tenses');
        const useDual = document.getElementById('useDual').checked, 
              unique = document.getElementById('noAmbiguity').checked,
              zeroNom = document.getElementById('zeroEnding').checked;

        const numbers = ["Singular", "Plural"];
        if (useDual) numbers.splice(1, 0, "Dual");
        const persons = ["1st", "2nd", "3rd"];

        nounMap = {}; verbMap = {}; lexicon = { nouns: {}, verbs: {} };
        const nounInv = new Set(), verbInv = new Set();

        numbers.forEach(num => {
            cases.forEach((cs, cIdx) => {
                genders.forEach((gen, gIdx) => {
                    const key = `${num}.${cs}.${gen}`.toLowerCase();
                    if (zeroNom && num === "Singular" && cIdx === 0 && gIdx === 0) {
                        nounMap[key] = "";
                    } else {
                        let m; do { m = makeSyllable(c, v); } while (unique && nounInv.has(m));
                        nounInv.add(m); nounMap[key] = m;
                    }
                });
            });
        });

        tenses.forEach(t => {
            persons.forEach(p => {
                numbers.forEach(n => {
                    const key = `${t}.${p}.${n}`.toLowerCase();
                    let m; do { m = makeSyllable(c, v); } while (unique && verbInv.has(m));
                    verbInv.add(m); verbMap[key] = m;
                });
            });
        });

        nounEnglish.forEach(e => {
            lexicon.nouns[e] = { stem: makeWord(c, v, 1, 2), gender: pick(genders) };
        });
        verbEnglish.forEach(e => {
            lexicon.verbs[e] = { stem: makeWord(c, v, 1, 2) };
        });

        renderLexicon();
        document.getElementById('lexicon-section').style.display = 'block';
        document.getElementById('translator-box').style.display = 'block';
        document.getElementById('creator-box').style.display = 'block';
        
        let html = "<h2>Noun Paradigm</h2>";
        numbers.forEach(num => {
            html += `<h3>${num}</h3><table><tr><th>Case</th>${genders.map(g=>`<th>${g}</th>`).join('')}</tr>`;
            cases.forEach(cs => {
                html += `<tr><td><strong>${cs}</strong></td>` + genders.map(g => `<td class="morph">-${nounMap[`${num}.${cs}.${g}`.toLowerCase()] || 'ø'}</td>`).join('') + "</tr>";
            });
            html += "</table>";
        });

        html += "<h2>Verb Paradigm</h2>";
        tenses.forEach(t => {
            html += `<h3>${t} Tense</h3><table><tr><th>Person</th>${numbers.map(n=>`<th>${n}</th>`).join('')}</tr>`;
            persons.forEach(p => {
                html += `<tr><td><strong>${p}</strong></td>` + numbers.map(n => `<td class="morph">-${verbMap[`${t}.${p}.${n}`.toLowerCase()]}</td>`).join('') + "</tr>";
            });
            html += "</table>";
        });
        document.getElementById('output').innerHTML = html;
    }

    function renderLexicon() {
        let lexHtml = "<div><h3>Nouns</h3><ul>";
        Object.keys(lexicon.nouns).forEach(e => {
            const l = lexicon.nouns[e];
            lexHtml += `<li><b>${e}</b>: ${l.stem} <small>(${l.gender})</small></li>`;
        });
        lexHtml += "</ul></div><div><h3>Verbs</h3><ul>";
        Object.keys(lexicon.verbs).forEach(e => {
            lexHtml += `<li><b>${e}</b>: ${lexicon.verbs[e].stem}</li>`;
        });
        lexHtml += "</ul></div>";
        document.getElementById('lexicon-display').innerHTML = lexHtml;
    }

    function addNewWord() {
        const meaning = document.getElementById('newWordMeaning').value.trim().toLowerCase();
        if (!meaning) return;
        const type = document.getElementById('newWordType').value;
        const stem = makeWord(getVal('cons'), getVal('vows'), 1, 2);
        if (type === "noun") lexicon.nouns[meaning] = { stem, gender: pick(getVal('genders')) };
        else lexicon.verbs[meaning] = { stem };
        renderLexicon();
        document.getElementById('newWordMeaning').value = "";
        translateInput();
    }

    function translateInput() {
        const fullInput = document.getElementById('transInput').value.toLowerCase().trim();
        if (!fullInput) { document.getElementById('transOutput').innerText = ""; return; }
        const translatedSentence = fullInput.split(/\s+/).map(chunk => {
            const tags = chunk.split('.');
            const root = tags[0];
            if (lexicon.nouns[root]) {
                const l = lexicon.nouns[root];
                const num = tags.find(t => ["singular", "plural", "dual"].includes(t)) || "singular";
                const cs = tags.find(t => getVal('cases').map(x=>x.toLowerCase()).includes(t)) || getVal('cases')[0].toLowerCase();
                return l.stem + (nounMap[`${num}.${cs}.${l.gender.toLowerCase()}`] || "");
            } else if (lexicon.verbs[root]) {
                const l = lexicon.verbs[root];
                const t = tags.find(t => getVal('tenses').map(x=>x.toLowerCase()).includes(t)) || getVal('tenses')[0].toLowerCase();
                const p = tags.find(t => ["1st", "2nd", "3rd"].includes(t)) || "3rd";
                const n = tags.find(t => ["singular", "plural", "dual"].includes(t)) || "singular";
                return l.stem + (verbMap[`${t}.${p}.${n}`] || "");
            }
            return "[?]";
        });
        document.getElementById('transOutput').innerText = translatedSentence.join(" ");
    }
</script>
</body>
</html>
